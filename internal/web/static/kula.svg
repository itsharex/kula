<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Intense glow for the stars and pulse line -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur1" />
            <feGaussianBlur stdDeviation="12" result="blur2" />
            <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Subtle glow for background stars -->
        <filter id="subtleGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Base 3D space gradient for the planet/sphere -->
        <radialGradient id="spaceGradient" cx="50%" cy="50%" r="50%" fx="35%" fy="35%">
            <stop offset="0%" stop-color="#1E293B" />
            <stop offset="60%" stop-color="#0F172A" />
            <stop offset="100%" stop-color="#020617" />
        </radialGradient>

        <!-- Glowing atmosphere rim around the sphere -->
        <linearGradient id="atmosphereRim" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#0EA5E9" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#0284C7" stop-opacity="0.6"/>
        </linearGradient>

        <!-- Gradient for the life line (Fading from Cosmic Blue to Neon Green back to Cosmic Blue) -->
        <linearGradient id="pulseGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.2"/>
            <stop offset="15%" stop-color="#0EA5E9" stop-opacity="1"/>
            <stop offset="40%" stop-color="#10B981" stop-opacity="1"/>
            <stop offset="60%" stop-color="#10B981" stop-opacity="1"/>
            <stop offset="85%" stop-color="#0EA5E9" stop-opacity="1"/>
            <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0.2"/>
        </linearGradient>

        <!-- Definition for a major 4-point star (sparkle) -->
        <g id="majorStar">
            <!-- Glowing rays -->
            <path d="M 0 -22 C 0 -5 5 0 22 0 C 5 0 0 5 0 22 C 0 5 -5 0 -22 0 C -5 0 0 -5 0 -22 Z" fill="#FFFFFF" filter="url(#glow)" opacity="0.9"/>
            <!-- Bright core -->
            <circle cx="0" cy="0" r="3.5" fill="#FFFFFF" />
        </g>

        <!-- Definition for a minor background star -->
        <g id="minorStar">
            <circle cx="0" cy="0" r="2" fill="#FFFFFF" filter="url(#subtleGlow)" />
        </g>

        <!-- Clip path to keep everything perfectly inside the sphere -->
        <clipPath id="planetClip">
            <circle cx="256" cy="256" r="256" />
        </clipPath>
    </defs>

    <!-- ========================================== -->
    <!-- BASE SPHERE (The "Kula" / Planet / Space)  -->
    <!-- ========================================== -->
    <!-- The circle has r="256" and is centered at 256, 256, making it touch the exact edges of the 512x512 canvas -->
    <circle cx="256" cy="256" r="256" fill="url(#spaceGradient)" />
    
    <!-- Atmosphere Rim (Inside the bounding box) -->
    <circle cx="256" cy="256" r="254" fill="none" stroke="url(#atmosphereRim)" stroke-width="4" opacity="0.9"/>

    <!-- ========================================== -->
    <!-- INNER ELEMENTS (Clipped to the sphere)     -->
    <!-- ========================================== -->
    <g clip-path="url(#planetClip)">
        
        <!-- Subtle 3D Grid (Meridians & Parallels) to keep the Linux/Tech feel -->
        <g stroke="#38BDF8" stroke-width="1.5" fill="none" opacity="0.15">
            <ellipse cx="256" cy="256" rx="100" ry="256" />
            <ellipse cx="256" cy="256" rx="256" ry="100" />
            <line x1="256" y1="0" x2="256" y2="512" />
            <line x1="0" y1="256" x2="512" y2="256" />
        </g>

        <!-- Tiny scattered background stars (Milky way effect) -->
        <g fill="#FFFFFF" opacity="0.5">
            <circle cx="90" cy="120" r="1" />
            <circle cx="150" cy="380" r="1.5" />
            <circle cx="410" cy="100" r="1" />
            <circle cx="380" cy="400" r="1.5" />
            <circle cx="200" cy="80" r="1" />
            <circle cx="300" cy="460" r="1" />
            <circle cx="450" cy="280" r="1.2" />
            <circle cx="60" cy="240" r="1" />
            <circle cx="250" cy="200" r="0.8" />
            <circle cx="340" cy="340" r="1" />
        </g>

        <!-- ========================================== -->
        <!-- CONSTELLATION NETWORK (Faint Branch Lines) -->
        <!-- ========================================== -->
        <g stroke="#38BDF8" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4" stroke-linecap="round">
            <!-- Connecting main nodes to distant stars -->
            <line x1="100" y1="270" x2="70" y2="160" />
            <line x1="140" y1="235" x2="200" y2="150" />
            <line x1="270" y1="100" x2="360" y2="80" />
            <line x1="310" y1="410" x2="220" y2="450" />
            <line x1="380" y1="270" x2="430" y2="370" />
            <line x1="435" y1="220" x2="480" y2="130" />
        </g>

        <!-- ========================================== -->
        <!-- THE LIFE LINE (EKG + Constellation Path)   -->
        <!-- ========================================== -->
        <g>
            <!-- Outer Glow for the Life Line -->
            <path d="M 10 270 L 100 270 L 140 235 L 180 270 L 220 270 L 240 330 L 270 100 L 310 410 L 340 270 L 380 270 L 435 220 L 475 270 L 502 270" 
                  fill="none" stroke="url(#pulseGradient)" stroke-width="6" stroke-linejoin="round" filter="url(#glow)" opacity="0.6"/>
            
            <!-- Crisp Inner Line for the Life Line -->
            <path d="M 10 270 L 100 270 L 140 235 L 180 270 L 220 270 L 240 330 L 270 100 L 310 410 L 340 270 L 380 270 L 435 220 L 475 270 L 502 270" 
                  fill="none" stroke="url(#pulseGradient)" stroke-width="2.5" stroke-linejoin="round"/>
        </g>

        <!-- ========================================== -->
        <!-- STAR NODES (Graph Data Points)             -->
        <!-- ========================================== -->
        
        <!-- 1. Background Constellation Ends (Minor Stars) -->
        <use href="#minorStar" x="70" y="160" />
        <use href="#minorStar" x="200" y="150" />
        <use href="#minorStar" x="220" y="450" />
        <use href="#minorStar" x="430" y="370" />
        
        <!-- 2. Regular Graph Nodes (Medium Stars) -->
        <circle cx="100" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="180" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="220" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="240" cy="330" r="3.5" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="340" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="380" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>
        <circle cx="475" cy="270" r="3" fill="#FFFFFF" filter="url(#subtleGlow)"/>

        <!-- 3. Major Peaks & Highlights (Shining Sparkles) -->
        <!-- P-Wave Peak -->
        <use href="#majorStar" x="140" y="235" />
        <!-- Massive High Spike (R-Wave) -->
        <use href="#majorStar" x="270" y="100" />
        <!-- Massive Low Spike (S-Wave) -->
        <use href="#majorStar" x="310" y="410" />
        <!-- T-Wave Peak -->
        <use href="#majorStar" x="435" y="220" />
        <!-- Huge Background Connected Star -->
        <use href="#majorStar" x="360" y="80" transform="scale(0.8) translate(90, 20)" opacity="0.8"/>
        <!-- Distant Major Star -->
        <use href="#majorStar" x="480" y="130" transform="scale(0.6) translate(320, 86)" opacity="0.6"/>

    </g>
</svg>